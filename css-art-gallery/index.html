<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Art Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CSS Art Gallery</h1>
    <p class="subtitle">Pure CSS illustrations — no images, no SVGs, just code</p>
  </header>

  <main class="gallery" id="gallery"></main>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose">&times;</button>
      <div class="lightbox-art" id="lightboxArt"></div>
      <h2 class="lightbox-title" id="lightboxTitle"></h2>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

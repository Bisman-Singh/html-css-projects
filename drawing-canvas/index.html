<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="toolbar">
      <div class="toolbar-section">
        <h3>Tools</h3>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          </button>
          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
          </button>
          <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
          </button>
        </div>
      </div>

      <div class="toolbar-section">
        <h3>Fill / Stroke</h3>
        <div class="toggle-group">
          <button class="toggle-btn active" data-mode="stroke">Stroke</button>
          <button class="toggle-btn" data-mode="fill">Fill</button>
        </div>
      </div>

      <div class="toolbar-section">
        <h3>Color</h3>
        <div class="color-picker-row">
          <input type="color" id="colorPicker" value="#ffffff">
          <span class="color-hex" id="colorHex">#ffffff</span>
        </div>
        <div class="color-swatches" id="colorSwatches">
          <button class="swatch" data-color="#ffffff" style="background:#ffffff"></button>
          <button class="swatch" data-color="#ef4444" style="background:#ef4444"></button>
          <button class="swatch" data-color="#f97316" style="background:#f97316"></button>
          <button class="swatch" data-color="#eab308" style="background:#eab308"></button>
          <button class="swatch" data-color="#22c55e" style="background:#22c55e"></button>
          <button class="swatch" data-color="#3b82f6" style="background:#3b82f6"></button>
          <button class="swatch" data-color="#8b5cf6" style="background:#8b5cf6"></button>
          <button class="swatch" data-color="#ec4899" style="background:#ec4899"></button>
          <button class="swatch" data-color="#6b7280" style="background:#6b7280"></button>
          <button class="swatch" data-color="#000000" style="background:#000000; border: 1px solid #374151;"></button>
        </div>
      </div>

      <div class="toolbar-section">
        <h3>Brush Size <span id="sizeValue">4</span>px</h3>
        <input type="range" id="brushSize" min="1" max="50" value="4" class="slider">
      </div>

      <div class="toolbar-section">
        <h3>Opacity <span id="opacityValue">100</span>%</h3>
        <input type="range" id="opacitySlider" min="1" max="100" value="100" class="slider">
      </div>

      <div class="toolbar-section">
        <h3>Actions</h3>
        <div class="action-buttons">
          <button class="action-btn" id="undoBtn" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
            Undo
          </button>
          <button class="action-btn" id="redoBtn" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
            Redo
          </button>
          <button class="action-btn" id="clearBtn" title="Clear Canvas">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            Clear
          </button>
          <button class="action-btn accent" id="exportBtn" title="Export PNG (Ctrl+S)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export PNG
          </button>
        </div>
      </div>

      <div class="toolbar-section">
        <label class="checkbox-label">
          <input type="checkbox" id="gridToggle">
          <span>Show Grid</span>
        </label>
      </div>
    </aside>

    <main class="canvas-area">
      <canvas id="gridCanvas"></canvas>
      <canvas id="previewCanvas"></canvas>
      <canvas id="drawingCanvas"></canvas>
    </main>
  </div>

  <div class="confirm-modal" id="confirmModal">
    <div class="modal-content">
      <h3>Clear Canvas?</h3>
      <p>This action cannot be undone. All your work will be lost.</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">Cancel</button>
        <button class="modal-btn confirm" id="modalConfirm">Clear</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

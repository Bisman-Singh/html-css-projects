<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Expense Tracker</h1>
    <button id="export-btn">Export CSV</button>
  </header>

  <main>
    <section class="summary-row">
      <div class="summary-card total">
        <span class="label">Balance</span>
        <span class="value" id="balance">$0.00</span>
      </div>
      <div class="summary-card income">
        <span class="label">Income</span>
        <span class="value" id="income">$0.00</span>
      </div>
      <div class="summary-card expense">
        <span class="label">Expenses</span>
        <span class="value" id="expenses">$0.00</span>
      </div>
    </section>

    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="tx-form">
        <div class="form-row">
          <div class="field">
            <label for="tx-type">Type</label>
            <select id="tx-type">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="field">
            <label for="tx-amount">Amount</label>
            <input type="number" id="tx-amount" min="0.01" step="0.01" required placeholder="0.00">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="tx-category">Category</label>
            <select id="tx-category">
              <option value="food">Food</option>
              <option value="transport">Transport</option>
              <option value="entertainment">Entertainment</option>
              <option value="bills">Bills</option>
              <option value="shopping">Shopping</option>
              <option value="salary">Salary</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="tx-date">Date</label>
            <input type="date" id="tx-date" required>
          </div>
        </div>
        <div class="field">
          <label for="tx-desc">Description</label>
          <input type="text" id="tx-desc" placeholder="What was this for?">
        </div>
        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section class="charts-section">
      <div class="chart-container">
        <h2>Spending by Category</h2>
        <canvas id="pie-chart" width="300" height="300"></canvas>
        <div id="pie-legend" class="chart-legend"></div>
      </div>
      <div class="chart-container">
        <h2>Daily Spending</h2>
        <canvas id="bar-chart" width="500" height="300"></canvas>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>Transactions</h2>
        <div class="filters">
          <select id="filter-category">
            <option value="all">All Categories</option>
            <option value="food">Food</option>
            <option value="transport">Transport</option>
            <option value="entertainment">Entertainment</option>
            <option value="bills">Bills</option>
            <option value="shopping">Shopping</option>
            <option value="salary">Salary</option>
            <option value="other">Other</option>
          </select>
          <input type="date" id="filter-from" title="From date">
          <input type="date" id="filter-to" title="To date">
        </div>
      </div>
      <div id="tx-list" class="tx-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="visualizer"></canvas>

  <div class="controls">
    <div class="controls-top">
      <label class="file-label">
        <input type="file" id="file-input" accept="audio/*">
        <span class="file-btn">Load Audio</span>
      </label>
      <span class="track-name" id="track-name">No file loaded</span>
    </div>

    <div class="controls-main">
      <button id="play-btn" class="icon-btn" disabled title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>
      </button>

      <div class="time-display">
        <span id="current-time">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span id="duration">0:00</span>
      </div>

      <div class="volume-group">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
      </div>

      <div class="mode-group">
        <button class="mode-btn active" data-mode="bars">Bars</button>
        <button class="mode-btn" data-mode="radial">Radial</button>
        <button class="mode-btn" data-mode="wave">Wave</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
